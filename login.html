<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Savings App</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase JS Client via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
  
  <div class="max-w-md w-full p-8 bg-gray-800 rounded-2xl shadow-2xl">
    
    <!-- Encabezado -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-2">Iniciar sesión 💰</h1>
      <p class="text-gray-400 text-sm">Bienvenido de vuelta a Savings App</p>
    </div>
    
    <!-- Formulario -->
    <form id="login-form" class="space-y-4">
      
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-1">
          Email
        </label>
        <input 
          type="email" 
          id="email" 
          name="email"
          required
          autocomplete="email"
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
          placeholder="tu@email.com">
      </div>
      
      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1">
          Contraseña
        </label>
        <input 
          type="password" 
          id="password" 
          name="password"
          required
          autocomplete="current-password"
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
          placeholder="Tu contraseña">
      </div>
      
      <!-- Mensaje de estado -->
      <div id="message" class="hidden p-3 rounded-lg text-sm text-center"></div>
      
      <!-- Botón submit -->
      <button 
        type="submit" 
        id="submit-btn"
        class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        Iniciar sesión
      </button>
      
    </form>
    
    <!-- Link a registro -->
    <p class="text-center text-sm text-gray-400 mt-6">
      ¿No tienes cuenta? 
      <a href="register.html" class="text-blue-400 hover:text-blue-300 font-medium">
        Regístrate
      </a>
    </p>
    
  </div>

  <!-- Scripts (orden importante) -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
